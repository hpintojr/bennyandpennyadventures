<!--
  Benny & Penny's Adventures — Cart page
  Reads localStorage (bp_cart). Updates live as items are added on the Product page.
  Maps to future Next.js route: app/cart/page.tsx
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Cart — Benny &amp; Penny's Adventures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Nunito:wght@400;500;600;700&display=swap');
  :root{--cream:#FFF6E8;--teal:#064852;--coral:#E7646C;--tan:#E8CFAE;--panel:#F9EAD7;--blush:#FDE4DE;--green:#EEF2E6;--body:#1D3237;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--teal);font-family:'Nunito',sans-serif;line-height:1.6}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:960px;margin:0 auto;padding:0 22px}
  h1,h2,h3{font-family:'Playfair Display',serif;margin:0}
  .heart{color:var(--coral)}
  .btn{display:inline-block;background:var(--coral);color:#fff;font-family:'Playfair Display',serif;padding:13px 24px;border-radius:999px;font-size:16px;border:none;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--teal);border:1px solid var(--tan)}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .bar{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:22px 0}
  .brand{display:block;line-height:1}
  .brand .n{font-family:'Playfair Display',serif;font-weight:700;font-size:38px;color:var(--teal);line-height:1}
  .brand .a{font-family:'Playfair Display',serif;font-style:italic;font-size:38px;color:var(--coral);line-height:1.05;text-align:center}
  .brand .a .hs{font-size:.85em;vertical-align:middle}
  .brand .t{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6b5d4f;margin-top:6px;font-weight:bold}
  .menu{display:flex;align-items:center;gap:20px;font-size:14px;font-weight:600;color:var(--body)}
  .cart-link{position:relative;display:inline-flex;align-items:center;color:var(--coral)}
  .cart-link svg{width:24px;height:24px}
  .cart-count{position:absolute;top:-9px;right:-11px;min-width:18px;height:18px;border-radius:999px;background:var(--coral);color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 5px;line-height:1}
  .hamb{display:none;flex:0 0 auto;width:46px;height:46px;align-items:center;justify-content:center;background:rgba(255,255,255,.7);border:1px solid var(--tan);border-radius:50%;font-size:22px;line-height:1;color:var(--teal);cursor:pointer}
  .mobile-menu{display:none;flex-direction:column;gap:6px;text-align:center;border:1px solid var(--tan);background:rgba(255,255,255,.7);border-radius:16px;padding:12px;margin:-4px 0 14px}
  .mobile-menu a{padding:10px;border-radius:10px;font-weight:600;color:var(--body)}
  .mobile-menu.open{display:flex}
  @media(max-width:1024px){
    .menu{display:none}
    .hamb{display:flex;position:absolute;right:5px;top:22px}
    .cart-link{position:absolute;right:60px;top:24px}
    .bar{position:relative;align-items:flex-start}
    .brand{flex:1;text-align:center}
    .brand .n,.brand .a,.brand .t{text-align:center}
  }
  @media(max-width:600px){.brand .n,.brand .a{font-size:26px}.brand .t{font-size:10px}}
  @media(max-width:380px){.brand .n,.brand .a{font-size:22px}.hamb{width:42px;height:42px;font-size:20px}.cart-link{right:54px}}

  .phead{padding:18px 0 8px}
  .phead h1{font-size:40px;color:var(--teal)}
  .empty{text-align:center;padding:50px 0}
  .empty p{color:var(--body);margin:0 0 18px}

  .row{display:grid;grid-template-columns:64px 1fr auto auto;gap:16px;align-items:center;background:rgba(255,255,255,.55);border:1px solid var(--tan);border-radius:16px;padding:14px 18px;margin-bottom:12px}
  .row .cov{width:64px;aspect-ratio:3/4;border-radius:8px;background:var(--panel);border:1px dashed #C9A98C;display:flex;align-items:center;justify-content:center;font-size:9px;color:#9C7E5E;text-align:center}
  .row .ti{font-family:'Playfair Display',serif;font-size:17px;color:var(--teal)}
  .row .fmt{font-size:12.5px;font-weight:700;color:var(--coral)}
  .row .qty{display:flex;align-items:center;border:1px solid var(--tan);border-radius:999px;overflow:hidden;background:#fff}
  .row .qty button{border:none;background:none;width:30px;height:34px;font-size:16px;cursor:pointer;color:var(--teal)}
  .row .qty span{min-width:24px;text-align:center;font-weight:700}
  .row .lp{font-family:'Playfair Display',serif;font-size:18px;color:var(--teal);text-align:right;min-width:72px}
  .row .rm{background:none;border:none;color:#b08;cursor:pointer;font-size:13px;font-weight:700;color:#9C7E5E}
  .row .rm:hover{color:var(--coral)}

  .summary{display:flex;flex-direction:column;align-items:flex-end;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid var(--tan)}
  .sub{font-size:20px;color:var(--teal)}
  .sub b{font-family:'Playfair Display',serif}
  .note{font-size:12px;color:#6b7d80}
  footer.foot{background:var(--teal);color:#fff;text-align:center;padding:22px;font-size:13px;margin-top:40px}
  @media(max-width:560px){.row{grid-template-columns:56px 1fr;row-gap:8px}.row .qty,.row .lp{grid-column:2}.row .lp{text-align:left}}
</style>

<div class="wrap">
  <header class="bar" id="top">
    <a class="brand" href="[C] Homepage Wireframe.html">
      <div class="n">Benny &amp; Penny's</div>
      <div class="a"><span class="hs">♥</span> Adventures <span class="hs">♥</span></div>
      <div class="t">Medical Books for Brave Little Hearts</div>
    </a>
    <nav class="menu">
      <a href="[C] Homepage Wireframe.html">Home</a>
      <a href="[C] Homepage Wireframe.html#author">About</a>
      <a href="[C] Homepage Wireframe.html#family">Our Characters</a>
      <a href="[C] Books.html">Books</a>
      <a href="[C] For Parents.html">For Parents</a>
      <a href="[C] Contact.html">Contact</a>
    </nav>
    <a class="cart-link" href="[C] Cart.html" aria-label="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="cart-count">0</span>
    </a>
    <button class="hamb" id="hamb" aria-label="Toggle menu">☰</button>
  </header>
  <nav class="mobile-menu" id="mobileMenu">
    <a href="[C] Homepage Wireframe.html">Home</a>
    <a href="[C] Homepage Wireframe.html#author">About</a>
    <a href="[C] Homepage Wireframe.html#family">Our Characters</a>
    <a href="[C] Books.html">Books</a>
    <a href="[C] For Parents.html">For Parents</a>
    <a href="[C] Contact.html">Contact</a>
    <a href="[C] Cart.html">Cart</a>
  </nav>

  <div class="phead"><h1>Your Cart <span class="heart">♥</span></h1></div>
  <div id="cartArea"></div>
</div>

<footer class="foot">© 2026 Benny &amp; Penny's Adventures. All rights reserved.</footer>

<script>
(function(){
  function get(){try{return JSON.parse(localStorage.getItem('bp_cart')||'[]')}catch(e){return[]}}
  function save(c){localStorage.setItem('bp_cart',JSON.stringify(c));refresh();}
  function count(){return get().reduce(function(n,i){return n+(i.qty||1)},0)}
  function refresh(){document.querySelectorAll('.cart-count').forEach(function(el){var c=count();el.textContent=c;el.style.display=c>0?'flex':'none';});if(window.renderCart)window.renderCart();}
  window.bpCart={get:get,save:save,refresh:refresh,
    setQty:function(i,q){var c=get();if(q<=0){c.splice(i,1)}else{c[i].qty=q}save(c);},
    remove:function(i){var c=get();c.splice(i,1);save(c);}};
  window.renderCart=function(){
    var c=get(), area=document.getElementById('cartArea'); if(!area)return;
    if(!c.length){area.innerHTML='<div class="empty"><p>Your cart is empty.</p><a class="btn" href="[C] Books.html">Browse the Books ♥</a></div>';return;}
    var html='', sub=0;
    c.forEach(function(it,i){var line=(it.price*it.qty);sub+=line;
      html+='<div class="row"><div class="cov">'+it.id+'</div>'+
        '<div><div class="ti">'+it.title+'</div><div class="fmt">'+it.format+' · $'+it.price.toFixed(2)+'</div></div>'+
        '<div class="qty"><button data-act="dec" data-i="'+i+'">−</button><span>'+it.qty+'</span><button data-act="inc" data-i="'+i+'">+</button></div>'+
        '<div class="lp">$'+line.toFixed(2)+'<br><button class="rm" data-act="rm" data-i="'+i+'">Remove</button></div></div>';
    });
    html+='<div class="summary"><div class="sub">Subtotal: <b>$'+sub.toFixed(2)+'</b></div>'+
      '<button class="btn" disabled>Proceed to Checkout (coming soon)</button>'+
      '<div class="note">Secure checkout with Stripe is coming soon. Taxes &amp; shipping calculated at checkout.</div></div>';
    area.innerHTML=html;
    area.querySelectorAll('button[data-act]').forEach(function(b){b.addEventListener('click',function(){
      var i=parseInt(b.dataset.i,10),c=get();
      if(b.dataset.act==='inc')window.bpCart.setQty(i,c[i].qty+1);
      else if(b.dataset.act==='dec')window.bpCart.setQty(i,c[i].qty-1);
      else if(b.dataset.act==='rm')window.bpCart.remove(i);
    });});
  };
  refresh();
})();
(function(){var b=document.getElementById('hamb'),m=document.getElementById('mobileMenu');if(b&&m){b.addEventListener('click',function(){var o=m.classList.toggle('open');b.textContent=o?'✕':'☰';});m.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){m.classList.remove('open');b.textContent='☰';});});}})();
</script>
